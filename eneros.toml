# EnerOS Default Configuration
# This file is loaded at startup. Environment variables (ENEROS_<SECTION>__<FIELD>)
# override values defined here. Run `eneros run --config eneros.toml` to use.

# ── Network model source ──────────────────────────────────────────────────
# source: "ieee14" (built-in test case) | "cnpower" (equipment DB via bridge) | "cim" (CIM/XML)
[network]
source = "ieee14"
# path = ""  # uncomment for cnpower/cim file-based loaders
initial_powerflow = true

# ── SCADA data source ─────────────────────────────────────────────────────
# source: "simulated" (built-in IEEE 14 data) | "iec104" (real RTU via IEC 60870-5-104)
[scada]
source = "simulated"
# iec104_addr = "127.0.0.1:2404"  # uncomment for real IEC 104
# iec104_asdu = 1
fast_interval_ms = 100
normal_interval_ms = 1000

# ── Device connections ────────────────────────────────────────────────────
# Each [[devices]] entry registers one physical device with the DeviceManager.
# Devices that fail to connect are logged but do not prevent server startup.
# Uncomment and edit to wire real RTUs/IEDs to the production execution path.
#
# Example: IEC 104 RTU
# [[devices]]
# device_id = "rtu-1"
# protocol = "iec104"
# host = "192.168.1.100"
# port = 2404
# params = { asdu_address = 1 }
#
# Example: IEC 61850 IED
# [[devices]]
# device_id = "ied-bay-3"
# protocol = "iec61850"
# host = "192.168.1.101"
# port = 102
# params = { logical_devices = ["BAY3"] }
#
# Example: Modbus TCP device (inverter, meter, etc.)
# [[devices]]
# device_id = "inverter-1"
# protocol = "modbus"
# host = "192.168.1.200"
# port = 502
# params = { slave_id = 1, baud_rate = 9600 }
#
# Example: MQTT device
# [[devices]]
# device_id = "gateway-1"
# protocol = "mqtt"
# host = "192.168.1.50"
# port = 1883
# params = { client_id = "eneros-gateway", topics = ["grid/telemetry/#"] }

# ── Topology engine ───────────────────────────────────────────────────────
[topology]
max_buses = 100000
max_branches = 200000
incremental_update = true

# ── Power flow solver ─────────────────────────────────────────────────────
[powerflow]
max_iterations = 50
tolerance = 1e-6
enable_n1_analysis = true
n1_parallel_workers = 8

# ── Constraint engine ─────────────────────────────────────────────────────
[constraint]
check_interval_ms = 100
auto_response = true
max_violation_history = 10000

# ── Time-series storage ───────────────────────────────────────────────────
# Data is persisted to SQLite (eneros_timeseries.db) by default.
# The in-memory ring buffer capacity is derived from these fields at startup:
#   capacity = retention_days * 86400 * 1000 / sampling_interval_ms
# clamped to a 10,000,000-point upper bound. Minimums enforced in code:
# retention_days >= 1, sampling_interval_ms >= 100.
[timeseries]
retention_days = 365          # 数据保留天数（默认 365，最小 1）
sampling_interval_ms = 1000   # 采样间隔毫秒（默认 1000，最小 100）
enable_compression = true     # 启用压缩（v0.8.0 仅记录日志，压缩逻辑由 Task 5 降采样实现）

# ── Event bus ─────────────────────────────────────────────────────────────
[eventbus]
max_queue_size = 100000
timeout_ms = 5000

# ── Device access ─────────────────────────────────────────────────────────
[device]
max_connections = 10000
connection_timeout_ms = 5000
buffer_size = 1024

# ── Agent subsystem ───────────────────────────────────────────────────────
[agent]
max_agents = 1000
tick_interval_ms = 1000
execution_timeout_ms = 5000
enable_constraint_validation = true
enable_audit_trail = true

# ── Emergency response ────────────────────────────────────────────────────
[emergency]
alert_frequency_hz = 49.8
emergency_frequency_hz = 49.5
alert_voltage_pu = 0.95
emergency_voltage_pu = 0.90
cascading_failure_threshold = 3
auto_escalation = true
emergency_voltage_relaxation_pu = 0.1
emergency_frequency_relaxation_hz = 0.5

# ── API server (v0.6.0) ───────────────────────────────────────────────────
# CLI args (--host, --port, --tls-cert, --tls-key) override these values.
[api]
host = "0.0.0.0"
port = 8080
max_body_bytes = 10485760  # 10 MB
request_timeout_secs = 30
enable_tls = false
# tls_cert_path = "/path/to/cert.pem"   # uncomment to enable TLS
# tls_key_path = "/path/to/key.pem"     # uncomment to enable TLS

# ── Security (v0.6.0) ─────────────────────────────────────────────────────
# Set enable_auth = true in production. The first login auto-registers as
# Supervisor (bootstrap mode). JWT secret must be set when auth is enabled.
[security]
enable_auth = false  # set to true in production
# jwt_secret = "change-me-to-a-random-secret-string"  # REQUIRED when enable_auth=true
jwt_ttl_secs = 3600       # 1 hour
jwt_refresh_secs = 86400  # 24 hours
enable_audit = true
audit_log_path = "eneros_audit.log"  # file-persistent audit log

# Static API keys (optional). Each entry maps a key to a role.
# [[security.api_keys]]
# key = "eneros-observer-key-12345"
# role = "observer"
# description = "Read-only monitoring client"

# ── Observability (v0.6.0) ────────────────────────────────────────────────
# Metrics are exported at /metrics in Prometheus format.
# JSON logging is enabled by default for log aggregation (ELK/Loki).
[observability]
enable_metrics = true
enable_json_logging = true
log_level = "info"  # trace | debug | info | warn | error
enable_tracing = false
metrics_retention_secs = 300
