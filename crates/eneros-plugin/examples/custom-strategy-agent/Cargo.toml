[package]
name = "custom-strategy-agent"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
eneros-plugin = { path = "../.." }
eneros-core = { path = "../../../eneros-core" }
