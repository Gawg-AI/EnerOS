# EnerOS init system configuration (示例配置)
#
# 本文件是 eneros-init 的示例配置，展示所有可用的配置选项。
# 实际生产环境使用 /etc/eneros/init.toml（由 rootfs 构建系统安装）。
#
# 启动顺序：
#   1. 系统服务（按依赖图拓扑排序）
#   2. eneros-ha（HA 守护进程，依赖 eventbus）
#   3. Agent 进程（在所有系统服务启动后由 AgentSupervisor 启动）
#
# 字段说明（ServiceConfig）：
#   name                  — 服务唯一名称（必填）
#   binary                — 二进制路径（必填）
#   args                  — 命令行参数（可选，默认空）
#   restart_policy        — 重启策略："always" / "on_failure" / "no"（可选，默认 "on_failure"）
#   dependencies          — 依赖服务名列表（可选，默认空）
#   env                   — 环境变量表（可选，默认空）
#   working_dir           — 工作目录（可选）
#   user                  — 运行用户（可选）
#   graceful_timeout_secs — 优雅关闭超时秒数（可选，默认 10）

# ---------------------------------------------------------------------------
# 系统服务（按依赖顺序启动）
# ---------------------------------------------------------------------------

[[services]]
name = "network"
binary = "/bin/eneros-netcfg"
restart_policy = "always"
dependencies = []
graceful_timeout_secs = 10

[services.env]
RUST_LOG = "info"

[[services]]
name = "timesync"
binary = "/bin/eneros-timesync"
restart_policy = "always"
dependencies = ["network"]
graceful_timeout_secs = 10

[[services]]
name = "syslog"
binary = "/bin/eneros-syslog"
restart_policy = "always"
dependencies = []
graceful_timeout_secs = 10

[[services]]
name = "devmgr"
binary = "/bin/eneros-devmgr"
restart_policy = "always"
dependencies = []
graceful_timeout_secs = 10

[[services]]
name = "eventbus"
binary = "/bin/eneros-broker"
args = ["--bind", "127.0.0.1:9876", "--channel-capacity", "4096"]
restart_policy = "always"
dependencies = ["network"]
graceful_timeout_secs = 10

[services.env]
RUST_LOG = "info"

[[services]]
name = "power-app"
binary = "/bin/eneros-api"
args = ["run", "--config", "/etc/eneros/eneros.toml"]
restart_policy = "on_failure"
dependencies = ["network", "timesync", "syslog", "devmgr", "eventbus"]
graceful_timeout_secs = 30

[services.env]
RUST_LOG = "info"
ENEROS_CONFIG = "/etc/eneros/eneros.toml"

# ---------------------------------------------------------------------------
# eneros-ha: HA 守护进程（ha-daemon）
# 启动顺序：系统服务 → eneros-ha → Agent 进程
# 依赖：eventbus（EventBusBroker 必须先启动，ha-daemon 通过 EventBus 发布 HaEvent）
# 崩溃后自动重启（restart_policy = "on_failure"）
# 优雅关闭：持久化快照 → 释放 VIP → 退出（graceful_timeout_secs = 30）
# ---------------------------------------------------------------------------

[[services]]
name = "eneros-ha"
binary = "/usr/bin/eneros-ha"
args = ["--config", "/etc/eneros/ha.toml"]
dependencies = ["eventbus"]
restart_policy = "on_failure"
graceful_timeout_secs = 30

[services.env]
RUST_LOG = "info"

# ---------------------------------------------------------------------------
# Agent 进程（在所有系统服务启动后由 AgentSupervisor 启动）
# 每个 Agent 作为独立 OS 进程运行，由 AgentSupervisor 管理。
# 调度策略：self-healing 使用 SCHED_FIFO（实时），其他使用 SCHED_OTHER。
# 资源配额：通过 cgroups v2 强制（cpu.max/memory.max/pids.max）。
# ---------------------------------------------------------------------------

[[agents]]
agent_id = "dispatch-1"
agent_type = "Dispatch"
authority = "Supervisor"
binary = "/bin/eneros-dispatch-agent"
args = [
    "--agent-id", "dispatch-1",
    "--eventbus-addr", "127.0.0.1:9876",
    "--gateway-addr", "127.0.0.1:9877",
]
dependencies = ["power-app"]

[agents.env]
RUST_LOG = "info"

[agents.resource_quota]
cpu_percent = 50
memory_mb = 512
max_pids = 100

[[agents]]
agent_id = "self-healing-1"
agent_type = "SelfHealing"
authority = "Emergency"
binary = "/bin/eneros-self-healing-agent"
args = [
    "--agent-id", "self-healing-1",
    "--eventbus-addr", "127.0.0.1:9876",
    "--gateway-addr", "127.0.0.1:9877",
    "--tick-interval-ms", "500",
]
dependencies = ["power-app"]

# RT 进程：SCHED_FIFO 优先级 80，CPU 隔离 [2,3]，mlockall
[agents.scheduling_policy.Realtime]
priority = 80
cpus = [2, 3]
lock_memory = true

[agents.resource_quota]
cpu_percent = 80
memory_mb = 1024
max_pids = 50
