# Prometheus scrape config for EnerOS
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # EnerOS API metrics
  - job_name: "eneros"
    static_configs:
      - targets: ["eneros:8080"]
    metrics_path: /metrics
    scrape_interval: 10s

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
