[workspace.package]
version = "0.115.0"
edition = "2021"
authors = ["EnerOS Team"]
license = "MIT OR Apache-2.0"

[profile.dev]
panic = "abort"
opt-level = 1

[profile.release]
panic = "abort"
opt-level = 3
lto = true
codegen-units = 1
strip = true
