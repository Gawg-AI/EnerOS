    "crates/drivers/calibration",
    "crates/security/crypto",
    "crates/security/iec62351",
    "crates/security/secure-boot",
    "crates/security/attestation",
    "crates/security/mtls",
    "crates/agents/agent",
    "crates/agents/hmi",
    "crates/agents/alarm",
    "crates/agents/energy-market-agent",
    "crates/agents/device-agent",
    "crates/agents/grid_agent",
    "crates/agents/mvp-scenario",
    "crates/agents/twin-agent",
    "crates/agents/coordinator",
    "crates/agents/cloud-coordinator",
