    "crates/drivers/power",
    "crates/drivers/storage",
    "crates/drivers/fs",
    "crates/drivers/tsdb",
    "crates/drivers/net",
    "crates/drivers/cellular",
    "crates/drivers/framework",
    "crates/drivers/rs485",
    "crates/drivers/can",
    "crates/protocols/modbus-rtu",
    "crates/protocols/modbus-tcp",
    "crates/protocols/iec104-slave",
    "crates/protocols/iec104-master",
    "crates/protocols/upa-model",
    "crates/protocols/protocol-abstract",
    "crates/protocols/telemetry-model",
