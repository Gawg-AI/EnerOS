    "crates/kernel/rtos-degrade",
    "crates/kernel/rtos-watchdog-degrade",
    "crates/ai/llm-engine",
    "crates/ai/gguf-loader",
    "crates/ai/model-deploy",
    "crates/ai/infer-scheduler",
    "crates/ai/prompt-template",
    "crates/ai/solver-core",
    "crates/ai/solver-model",
