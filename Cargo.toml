[workspace]
resolver = "2"
members = [
    "crates/eneros-core",
    "crates/eneros-topology",
    "crates/eneros-powerflow",
    "crates/eneros-constraint",
    "crates/eneros-equipment",
    "crates/eneros-timeseries",
    "crates/eneros-eventbus",
    "crates/eneros-gateway",
    "crates/eneros-device",
    "crates/eneros-api",
    "crates/eneros-bridge",
    "crates/eneros-network",
    "crates/eneros-memory",
    "crates/eneros-tool",
    "crates/eneros-reasoning",
    "crates/eneros-agent",
    "crates/eneros-scada",
    "crates/eneros-analysis",
    "crates/eneros-dashboard",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["GAWG-AI"]
license = "MIT"
description = "EnerOS - Power-Native Agent Operating System"

[workspace.dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Logging
tracing = "0.1"
tracing-subscriber = "0.3"

# Error handling
thiserror = "1"
anyhow = "1"

# Data structures
dashmap = "5"
parking_lot = "0.12"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

# Math/Science
ndarray = "0.15"
num-complex = "0.4"

# Hashing
ahash = "0.8"

# Metrics
metrics = "0.21"
metrics-exporter-prometheus = "0.11"

# Config
toml = "0.8"
clap = { version = "4", features = ["derive"] }
