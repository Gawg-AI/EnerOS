# EnerOS init system configuration
# This file defines the system services and Agent processes managed by eneros-init

# ---------------------------------------------------------------------------
# System services (started first, in dependency order)
# ---------------------------------------------------------------------------

[[services]]
name = "network"
binary = "/bin/eneros-netcfg"
restart_policy = "always"
dependencies = []
graceful_timeout_secs = 10

[services.env]
RUST_LOG = "info"

[[services]]
name = "timesync"
binary = "/bin/eneros-timesync"
restart_policy = "always"
dependencies = ["network"]
graceful_timeout_secs = 10

[[services]]
name = "syslog"
binary = "/bin/eneros-syslog"
restart_policy = "always"
dependencies = []
graceful_timeout_secs = 10

[[services]]
name = "devmgr"
binary = "/bin/eneros-devmgr"
restart_policy = "always"
dependencies = []
graceful_timeout_secs = 10

[[services]]
name = "eventbus"
binary = "/bin/eneros-broker"
args = ["--bind", "127.0.0.1:9876", "--channel-capacity", "4096"]
restart_policy = "always"
dependencies = ["network"]
graceful_timeout_secs = 10

[services.env]
RUST_LOG = "info"

[[services]]
name = "power-app"
binary = "/bin/eneros-api"
args = ["run", "--config", "/etc/eneros/eneros.toml"]
restart_policy = "on_failure"
dependencies = ["network", "timesync", "syslog", "devmgr", "eventbus"]
graceful_timeout_secs = 30

[services.env]
RUST_LOG = "info"
ENEROS_CONFIG = "/etc/eneros/eneros.toml"

# ---------------------------------------------------------------------------
# eneros-ha: HA 守护进程（ha-daemon）
# 启动顺序：系统服务 → eneros-ha → Agent 进程
# 依赖：eventbus（EventBusBroker 必须先启动，ha-daemon 通过 EventBus 发布 HaEvent）
# 崩溃后自动重启（restart_policy = "on_failure"）
# 优雅关闭：持久化快照 → 释放 VIP → 退出（graceful_timeout_secs = 30）
# ---------------------------------------------------------------------------

[[services]]
name = "eneros-ha"
binary = "/usr/bin/eneros-ha"
args = ["--config", "/etc/eneros/ha.toml"]
dependencies = ["eventbus"]
restart_policy = "on_failure"
graceful_timeout_secs = 30

[services.env]
RUST_LOG = "info"

# ---------------------------------------------------------------------------
# Agent processes (started after system services)
# Each Agent runs as an independent OS process managed by AgentSupervisor.
# Scheduling: self-healing uses SCHED_FIFO (RT), others use SCHED_OTHER.
# Resource quotas: enforced via cgroups v2 (cpu.max/memory.max/pids.max).
# ---------------------------------------------------------------------------

[[agents]]
agent_id = "dispatch-1"
agent_type = "Dispatch"
authority = "Supervisor"
binary = "/bin/eneros-dispatch-agent"
args = [
    "--agent-id", "dispatch-1",
    "--eventbus-addr", "127.0.0.1:9876",
    "--gateway-addr", "127.0.0.1:9877",
]
dependencies = ["power-app"]

[agents.env]
RUST_LOG = "info"

[agents.resource_quota]
cpu_percent = 50
memory_mb = 512
max_pids = 100

[[agents]]
agent_id = "forecast-1"
agent_type = "Forecast"
authority = "Observer"
binary = "/bin/eneros-forecast-agent"
args = [
    "--agent-id", "forecast-1",
    "--eventbus-addr", "127.0.0.1:9876",
    "--gateway-addr", "127.0.0.1:9877",
]
dependencies = ["power-app"]

[agents.resource_quota]
cpu_percent = 30
memory_mb = 512
max_pids = 100

[[agents]]
agent_id = "operation-1"
agent_type = "Operation"
authority = "Supervisor"
binary = "/bin/eneros-operation-agent"
args = [
    "--agent-id", "operation-1",
    "--eventbus-addr", "127.0.0.1:9876",
    "--gateway-addr", "127.0.0.1:9877",
]
dependencies = ["power-app"]

[agents.resource_quota]
cpu_percent = 50
memory_mb = 512
max_pids = 100

[[agents]]
agent_id = "self-healing-1"
agent_type = "SelfHealing"
authority = "Emergency"
binary = "/bin/eneros-self-healing-agent"
args = [
    "--agent-id", "self-healing-1",
    "--eventbus-addr", "127.0.0.1:9876",
    "--gateway-addr", "127.0.0.1:9877",
    "--tick-interval-ms", "500",
]
dependencies = ["power-app"]

# RT 进程：SCHED_FIFO 优先级 80，CPU 隔离 [2,3]，mlockall
[agents.scheduling_policy.Realtime]
priority = 80
cpus = [2, 3]
lock_memory = true

[agents.resource_quota]
cpu_percent = 80
memory_mb = 1024
max_pids = 50

[[agents]]
agent_id = "planning-1"
agent_type = "Planning"
authority = "Operator"
binary = "/bin/eneros-planning-agent"
args = [
    "--agent-id", "planning-1",
    "--eventbus-addr", "127.0.0.1:9876",
    "--gateway-addr", "127.0.0.1:9877",
]
dependencies = ["power-app"]

[agents.resource_quota]
cpu_percent = 30
memory_mb = 512
max_pids = 100

[[agents]]
agent_id = "trading-1"
agent_type = "Trading"
authority = "Operator"
binary = "/bin/eneros-trading-agent"
args = [
    "--agent-id", "trading-1",
    "--eventbus-addr", "127.0.0.1:9876",
    "--gateway-addr", "127.0.0.1:9877",
]
dependencies = ["power-app"]

[agents.resource_quota]
cpu_percent = 30
memory_mb = 512
max_pids = 100
