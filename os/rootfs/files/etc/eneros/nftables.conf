#!/usr/sbin/nft -f
# EnerOS 防火墙配置 — 电力通信安全策略
# 入站：仅允许 IEC 104/61850/SSH/EventBus
# 出站：仅允许 NTP/PTP/syslog

flush ruleset

table inet eneros {
    chain input {
        type filter hook input priority 0; policy drop;
        ct state established,related accept
        iif "lo" accept
        tcp dport 22 accept comment "SSH management"
        tcp dport 102 accept comment "IEC 61850 MMS"
        tcp dport 2404 accept comment "IEC 104"
        tcp dport 9876 accept comment "EventBus internal"
    }

    chain output {
        type filter hook output priority 0; policy drop;
        oif "lo" accept
        udp dport 123 accept comment "NTP"
        udp dport 319 accept comment "PTP event"
        udp dport 320 accept comment "PTP general"
        udp dport 514 accept comment "syslog"
    }
}
