# EnerOS GRUB UEFI configuration
# 5 分区 A/B 布局：EFI(gpt1) / RootA(gpt2) / RootB(gpt3) / Data(gpt4) / Config(gpt5)
# 此文件放置在 EFI System Partition 的 EFI/ENEROS/grub.cfg 和 RootA 的 /boot/grub/grub.cfg

set timeout=3
set default=0

# Load required modules
insmod part_gpt
insmod ext2
insmod fat
insmod search
insmod search_fs_uuid

# Set color scheme
set menu_color_normal=white/blue
set menu_color_highlight=black/light-gray

# 加载 grubenv 环境变量块（从 EFI System Partition）
set root=(hd0,gpt1)
load_env -f /EFI/ENEROS/grubenv

# 根据 next_slot 变量选择默认启动项
# next_slot=A -> default=0 (Slot A)
# next_slot=B -> default=1 (Slot B)
if [ "${next_slot}" = "B" ]; then
    set default=1
else
    set default=0
fi

# boot_count 超过 3 次自动回退到另一个槽位
# 防止坏槽位导致系统无法启动
if [ "${boot_count}" != "" ]; then
    if [ "${boot_count}" -ge 3 ]; then
        if [ "${next_slot}" = "A" ]; then
            set next_slot=B
            set default=1
        else
            set next_slot=A
            set default=0
        fi
        set boot_count=0
        save_env -f /EFI/ENEROS/grubenv next_slot boot_count
    fi
fi

# Menu entry 0: Slot A (默认启动槽位)
menuentry "EnerOS Power-Native OS (Slot A)" {
    set root=(hd0,gpt2)
    echo "Loading EnerOS kernel (Slot A)..."
    linux /boot/vmlinuz-eneros root=/dev/sda2 ro rootfstype=ext4 \
          isolcpus=2,3 nohz_full=2,3 rcu_nocbs=2,3 irqaffinity=0,1 mlock=1 \
          console=ttyS0,115200 console=tty0 \
          panic=10 \
          ENEROS_BOOT_SLOT=A
    echo "Loading initramfs..."
    initrd /boot/initramfs.img
}

# Menu entry 1: Slot B (OTA 更新后的备用槽位)
menuentry "EnerOS Power-Native OS (Slot B)" {
    set root=(hd0,gpt3)
    echo "Loading EnerOS kernel (Slot B)..."
    linux /boot/vmlinuz-eneros root=/dev/sda3 ro rootfstype=ext4 \
          isolcpus=2,3 nohz_full=2,3 rcu_nocbs=2,3 irqaffinity=0,1 mlock=1 \
          console=ttyS0,115200 console=tty0 \
          panic=10 \
          ENEROS_BOOT_SLOT=B
    echo "Loading initramfs..."
    initrd /boot/initramfs.img
}

# Menu entry 2: Recovery Mode (Slot A, 单用户模式)
menuentry "EnerOS Power-Native OS (Recovery)" {
    set root=(hd0,gpt2)
    echo "Loading EnerOS kernel (Recovery)..."
    linux /boot/vmlinuz-eneros root=/dev/sda2 ro rootfstype=ext4 \
          single \
          console=ttyS0,115200 console=tty0 \
          ENEROS_BOOT_SLOT=A
    echo "Loading initramfs..."
    initrd /boot/initramfs.img
}
