# EnerOS systemd-boot configuration
# This file is placed in the EFI System Partition at loader/entries/eneros.conf

title   EnerOS Power-Native OS
version 1.0.0
linux   /boot/vmlinuz-eneros
initrd  /boot/initramfs.img
options root=/dev/sda2 ro rootfstype=ext4 isolcpus=2,3 nohz_full=2,3 rcu_nocbs=2,3 irqaffinity=0,1 mlock=1 console=ttyS0,115200 console=tty0 ENEROS_BOOT_SLOT=A

# Recovery entry
title   EnerOS Power-Native OS (Recovery)
version 1.0.0
linux   /boot/vmlinuz-eneros
initrd  /boot/initramfs.img
options root=/dev/sda2 ro rootfstype=ext4 single console=ttyS0,115200 console=tty0 ENEROS_BOOT_SLOT=A
