# EnerOS v0.115.0 mTLS 双向认证通信安全 配置模板
#
# ① 本文件仅为配置模板：真实证书 / 私钥 / CA 根由集成层在产线烧录（安全
#    存储或 HSM），私钥绝不入仓（记忆 §3.1 密钥禁忌）；下方路径均为占位符。
# ② 集成层启动时读取本配置：解析 [context] 的证书 / 私钥 / 信任根（DER
#    格式）构造 `MtlsContext`，按 [cipher].suites 声明本地套件列表，按
#    [crl] 可选加载吊销列表后调用 `CertManager::load_crl`。
# ③ 证书验证顺序固定：链式验签 → 有效期 → CRL 吊销（蓝图 §4.3），任何
#    一步失败即中止握手并计入 `TlsStats.rejected`。

[context]
# ④ 本地证书 / 私钥 / 信任根路径（占位符，DER 编码；私钥为 SM2 32 字节
#    标量，烧录时替换为真实路径，读取后立即清零内存副本）。
cert_path = "secure-storage/mtls/local-cert.der"
key_path = "secure-storage/mtls/local-key.bin"
ca_roots = ["secure-storage/mtls/ca-root.der"]

# ⑤ 双向认证开关：true = 双向 mTLS（默认，蓝图 §4.3 强制互验）；false =
# 单向模式（仅验证服务端证书，仅限调试场景，双端配置必须一致）。
verify_peer = true

[cipher]
# ⑥ 本地支持的 SM 密码套件列表（编码格式 "密钥交换-分组加密-消息认证"）；
# 服务端按本列表优先序选出首个双方共同套件，无交集返回
# `TlsError::NoCommonCipherSuite`（蓝图 §4.2）。推荐首项 SM2DHE-SM4GCM-
# SM3HMAC（AEAD + 前向安全）。
suites = ["SM2DHE-SM4GCM-SM3HMAC", "SM2DHE-SM4CBC-SM3HMAC"]

[crl]
# ⑦ CRL 吊销列表路径（可选加固项，蓝图 §4.3；占位符）。启用后握手证书
# 验证命中吊销序列号即返回 `CertError::Revoked`；未配置视为「无吊销信息」。
# 建议由运维通道每日刷新并热加载（`load_crl` 覆盖旧表）。
crl_path = "secure-storage/mtls/ca.crl"
refresh_interval_secs = 86400
