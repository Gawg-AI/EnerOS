# ============================================================
# EnerOS v0.93.0 Edge Coordinator — 域级优化配置
# ============================================================
# Crate: eneros-coordinator (crates/agents/coordinator/)
# 版本: v0.93.0 域级优化（P2-D 第 2 版）
# 蓝图: phase2.md §v0.93.0
#
# 域级优化语义（一句话）：
#   收集域内所有 Edge Box 状态 → 构建域级 LP（各 box 容量/平衡约束）
#   → Solver 求解 → 下发各 EdgeBox，使园区级整体收益优于单机独立调度。
#
# ---------------------------------------------------------------
# 性能目标（蓝图 §6.3）
# ---------------------------------------------------------------
#   求解耗时 < 2s —— 【集成阶段验收】，非本配置强制：
#   本版本交付算法骨架 + 单元验证；max_boxes 限制 LP 变量规模，
#   实际耗时由集成阶段真实负载验证后正式验收。
#
# ---------------------------------------------------------------
# 域容量安全（蓝图 §7.3，D11）
# ---------------------------------------------------------------
#   target_mw 超过总在线 capacity 时，clamp 到总在线容量后再建 LP，
#   构造上保证域级不超发，不报错中断调度。
#
# ---------------------------------------------------------------
# Edge Box 离线排除（蓝图 §4.4，D8）
# ---------------------------------------------------------------
#   online=false 的 box 从 LP 与 DomainPlan 中排除；
#   状态保留不删除，set_online(id, true) 后可恢复纳入。
#
# ---------------------------------------------------------------
# 状态一致性坑点（蓝图 §8.5）
# ---------------------------------------------------------------
#   socs / capacity_mw 需与 Edge Box 实际上报保持同步；
#   脏数据（NaN / 非有限值）经 sanitize 防御，不传播不 panic。
#
# ---------------------------------------------------------------
# 动态 EdgeBox 增删（蓝图 §9 可扩展）
# ---------------------------------------------------------------
#   add_box / remove_box / set_online 支持运行时变更；
#   新增 box 下一轮 optimize 自动纳入，无需重启优化器。
#
# ---------------------------------------------------------------
# NaN 防御（D12，v0.88.0 C140 教训）
# ---------------------------------------------------------------
#   soc NaN → 按耗尽跳过该设备；capacity 非有限或 ≤0 → 排除该 box；
#   efficiency 非有限或越出 [0,1] → clamp（NaN → 0.5 中性）；
#   price 非有限 → 收益按 0.0。

[domain_optimizer]
# 域内 Edge Box 上限：内存预算控制（蓝图 §43.6 Agent Runtime ≤ 64MB），
# 限制 LP 变量规模，保障求解耗时可控（蓝图 §6.3）
max_boxes = 32
# LP 失败兜底策略标识：容量比例分摊（D10 确定性兜底，不迭代重试 LP；
# box 内复用 equal_split clamp [p_min, p_max]，objective_value = 0.0）
fallback = "capacity_proportional"
