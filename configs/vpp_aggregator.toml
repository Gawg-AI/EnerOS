# ============================================================
# EnerOS v0.94.0 Edge Coordinator — VPP 聚合配置
# ============================================================
# Crate: eneros-coordinator (crates/agents/coordinator/)
# 版本: v0.94.0 VPP 聚合（Phase 2 P2-D 关键版，★ Phase 2 出口标准）
# 蓝图: phase2.md §v0.94.0
#
# VPP 聚合语义（一句话）：
#   聚合域内 DER 容量形成 VppProfile（容量/爬坡）→ 聚合出力控制
#   （target 经 DomainOptimizer 分配到各资源）→ 市场申报（生成 Sell 报价），
#   为 v0.95.0 云端策略下发与 v0.96.0 Cloud Coordinator 提供聚合基础。
#
# ---------------------------------------------------------------
# 1. VPP 响应性能（蓝图 §6.3 / §7.2）
# ---------------------------------------------------------------
#   VPP 响应耗时 < 30s —— 【集成阶段验收】，非本配置强制：
#   本版本交付算法骨架 + 单元验证；max_resources 限制资源规模，
#   实际响应耗时由集成阶段真实负载验证后正式验收。
#
# ---------------------------------------------------------------
# 2. dispatch 不超聚合可用容量（蓝图 §7.3，D10）
# ---------------------------------------------------------------
#   |target_mw| > 聚合 available_mw → 拒绝并返回 InsufficientCapacity，
#   含负 target（充电场景）按 abs 判定；不产生任何 dispatch，
#   构造上保证不超聚合容量下发。
#
# ---------------------------------------------------------------
# 3. 资源离线 → 聚合重算（蓝图 §6.5，D6）
# ---------------------------------------------------------------
#   online=false 的资源从聚合与分配中即时排除，下次 aggregate /
#   dispatch 自动重算；状态保留不删除，set_online(id, true) 后恢复纳入。
#
# ---------------------------------------------------------------
# 4. 申报与执行偏差坑点（蓝图 §8.5）
# ---------------------------------------------------------------
#   market_bid 申报量 quantity = min(available, max_quantity)，
#   保证申报量 ≤ 资源实际可用容量；执行侧经 dispatch 分配到各资源
#   形成闭环，申报与执行偏差由聚合层统一管控。
#
# ---------------------------------------------------------------
# 5. 资源清单配置化（蓝图 §9 可维护）
# ---------------------------------------------------------------
#   新增 DER 仅需在下方追加一个 [[vpp_resource]] 段，
#   无需修改代码或重启聚合器，下一轮 aggregate 自动纳入。
#
# ---------------------------------------------------------------
# 6. NaN 防御（D12，v0.88.0 C140 / v0.93.0 D12 教训）
# ---------------------------------------------------------------
#   capacity 非有限或 ≤0 → 资源从聚合排除；
#   available 非有限 → 按 0 处理且 clamp 到 [0, capacity]；
#   efficiency NaN → 0.5 中性并 clamp [0,1]；
#   ramp 非有限或为负 → 按 0 计入 profile（仅上报不参与分配）。

[vpp_aggregator]
# VPP 资源数量上限：内存预算控制（蓝图 §43.6 Agent Runtime ≤ 64MB），
# 限制 BTreeMap 资源表与 LP 变量规模，保障响应耗时可控（蓝图 §6.3）
max_resources = 64
# 默认报价边际（元/MWh）：market_bid 报价 price = 市场现价 + margin，
# 确保 DER 上网报价覆盖边际成本（蓝图 §8.5 申报坑点）
default_margin = 5.0

# 资源 1：储能电池（Battery）——双向调节，VPP 主力可调资源
[[vpp_resource]]
resource_id = 1
type = "Battery"
capacity_mw = 5.0
available_mw = 4.0
ramp_rate = 1.0
efficiency = 0.95
online = true

# 资源 2：光伏（Pv）——不可调度发电侧资源，出力随预测可用容量申报
[[vpp_resource]]
resource_id = 2
type = "Pv"
capacity_mw = 3.0
available_mw = 2.5
ramp_rate = 0.5
efficiency = 0.98
online = true

# 资源 3：充电桩（Charger）——可调负荷侧资源，支持负 target 充电场景
[[vpp_resource]]
resource_id = 3
type = "Charger"
capacity_mw = 2.0
available_mw = 1.5
ramp_rate = 0.5
efficiency = 0.90
online = true
