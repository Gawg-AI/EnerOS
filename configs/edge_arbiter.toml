# ============================================================
# EnerOS v0.92.0 Edge Coordinator — 域内仲裁策略配置
# ============================================================
# Crate: eneros-coordinator (crates/agents/coordinator/)
# 版本: v0.92.0 域内仲裁（P2-D 起点）
# 蓝图: phase2.md §v0.92.0
#
# 仲裁语义（一句话）：
#   多 Agent 争抢同一共享资源（PCC 并网容量、变压器容量）时，
#   按"竞价为主 + 安全底线"原则三级仲裁，返回唯一 winner 或 None。
#
# ---------------------------------------------------------------
# 三级仲裁顺序（不可逾越，安全为绝对底线）
# ---------------------------------------------------------------
# ① safety_critical（最高优先级）：
#     任何 safety_critical=true 的 claimant 永远胜出。
#     若 ≥2 个 safety_critical，确定性取输入序列首个为 winner，
#     同时 ArbitrationResult.conflict=true + conflict_count 计数器递增，
#     告警运维需人工介入（D10，蓝图 §7.3 安全压制）。
#
# ② urgent（deadline 临近）：
#     无 safety_critical 时，检查 deadline < now + urgent_window_ms 的 claimant。
#     视为 urgent，取最早 deadline（min_by_key）胜出，reason = Deadline。
#     紧急窗口配置化，避免蓝图 §4.5 硬编码 now+1000 的维护风险（D12）。
#
# ③ highest bid（竞价）：
#     无 safety、无 urgent 时，按 cmp_bid 全序比较报价，最高者胜出，reason = HighestBid。
#     NaN 报价恒视为最低，全 NaN 时确定性取输入序首个，永不 panic（D11，v0.88.0 C140 教训）。
#
# ④ 空 claimants：
#     winner = None，reason = Default，不 panic（D8）。
#
# ---------------------------------------------------------------
# 性能目标（蓝图 §7.2）
# ---------------------------------------------------------------
#   仲裁耗时 < 10ms —— 【集成阶段验收】：
#   本版本交付算法骨架 + 单元验证，纯标量 O(claimant 数) 遍历，
#   实际目标余量充足。集成阶段需经真实负载验证后正式验收。
#
# ---------------------------------------------------------------
# NaN 报价防御（D11，v0.88.0 C140 教训）
# ---------------------------------------------------------------
#   cmp_bid 实现全序：NaN 视为最低值，不 panic；
#   ±Inf 保留偏序语义（+Inf 最高，-Inf 最低，非 NaN）。
#   全 claimants 报价均为 NaN → 确定性取输入序首个，reason = HighestBid，
#   避免 partial_cmp.unwrap()  panic（蓝图 §4.5 原代码风险）。
#
# ---------------------------------------------------------------
# 仲裁结果广播（蓝图 §8.5 坑点）
# ---------------------------------------------------------------
#   ArbitrationResult 需广播通知所有 claimants（含落败方），
#   以便各 Agent 释放预留资源或调整本地策略。
#   本版本仅交付仲裁算法骨架；下游 DDS 总线集成时负责广播投递。
#
# ---------------------------------------------------------------
# 仲裁饥饿老化机制（蓝图 §8.1）
# ---------------------------------------------------------------
#   当前纯即时三级仲裁，低 bid Agent 可能长期无法获胜。
#   老化机制（如递增优先级/保底配额）规划在后续版本实现，
#   本版本暂不引入，但计数器 total/safety/deadline/bid/empty/conflict
#   已预留可观测数据，供后续老化策略决策。
#
# ---------------------------------------------------------------
# 时间溢出防御（D12）
# ---------------------------------------------------------------
#   now_ms.saturating_add(urgent_window_ms) 防 u64 溢出，
#   避免 deadline 检查因时间溢出导致误判 urgent。

[arbiter]
# 紧急窗口（ms）：deadline < now + urgent_window_ms 的 claimant 视为 urgent（D12，与 ArbiterPolicy::default 一致）
urgent_window_ms = 1000
