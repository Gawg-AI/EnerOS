# ============================================================
# EnerOS v0.102.0 MILP Solver — 混合整数线性规划求解器集成配置
# ============================================================
# Crate: eneros-solver (crates/ai/solver/src/{highs,model,degrade,status}.rs)
# 版本: v0.102.0 MILP 求解器集成（HiGHS 选型 + 三级降级链 + 内存预算，Phase 2 P2-F 第 1 版）
# 蓝图: phase2.md §v0.102.0
#
# 求解器文义（一句话）：
#   机组组合优化等调度问题——统一建模为 MILP，HiGHS 求解并配三级降级链；
#   超时返回当前最优可行解，内存受控 ≤128MB，不达标时逐级松弛直至 LP 兜底。

[milp]
# 【注释点 1 · HiGHS 选型理由（蓝图 §5.1）】求解器选型：HiGHS——开源
# 高性能 MILP 求解器，Apache 2.0 许可证无出口管制限制，国产化合规；对比
# CBC（EPL 许可证出口风险）、SCIP（学术许可商业受限），HiGHS 为唯一满足
# 合规 + 性能双重要求的默认集成；Rust 侧仅封装 FFI 调用 + 能源建模层，
# 核心求解不可配置（跨节点模型语义必须逐字节一致）。
time_limit_s = 30.0

# 【注释点 2 · 超时返回当前最优可行解（蓝图 §4.4）】单次求解时间限制（秒）：
# 蓝图 §4.5 默认值 30.0；time_limit_s 触发后 HiGHS 返回 incumbent（当前
# 最优可行解），SolveStatus::Timeout 视为可接受——不抛异常，上层调度模块
# 收到 Timeout 时直接使用该可行解执行，避免无输出导致控制空窗。

# 【注释点 3 · 三级降级链（蓝图 D9）】求解失败/超时/不可行时的三级降级：
# ① MILP（完整模型，含最小启停时间 0-1 约束）→ ② relaxed MILP（松弛
# 最小启停时间约束，允许短时违反）→ ③ LP 松弛（全部 Binary 变量放宽为
# Continuous，退化为纯线性规划）；每级切换时 relax_count / lp_fallback_count
# 计数器 +1 并字段化可观测，上层 Agent Runtime 读计数器聚合告警（如
# lp_fallback_count 持续走高提示模型参数或约束配置失当）。

# 【注释点 4 · 内存预算 ≤128MB（蓝图 §5.6）】Solver 分区内存预算：
# 总量 ≤128MB（蓝图 §43.6 分区预算），OOM 策略为缩减问题规模 / 超时降级；
# 按 10 机组 ×24 周期估算峰值约 40~60MB（含矩阵 + 分支定界树），预留余量
# 2× 以容纳临时副本与 FFI 层开销；接近预算时触发预检：若预估内存 >100MB
# 先尝试缩减时段或机组数再提交求解。

# 【注释点 5 · 性能目标（蓝图 §7.2）】硬件集成验证项：10 机组 ×24 周期
# 求解 <5s；其中模型构建 <1s 已实测（蓝图 §7.2 交付项），剩余 4s 为求解
# 主体时间；30s 默认值留足裕度，现场可按算力下调（如边缘节点设为 10s）。

# 【注释点 6 · 整数规模说明】变量规模：机组数 n × 周期数 t × 4 类变量
# （P 连续出力 + U/V/W 三类 0-1 变量 per 机组×周期），即 5×24=480 变量 /
# 10×24=960 变量；0-1 变量占比 75%，决定分支定界复杂度，也是三级降级链
# 中 Binary→Continuous 可大幅提速的理论依据。

# 【注释点 7 · mip_rel_gap 含义】MIP 相对间隙容忍度：0.01 = 1%，即当
# (当前最优解 - 当前最好下界) / |当前最优解| ≤ 1% 时接受次优解并提前终止；
# Suboptimal 可接受——能源调度场景 1% 精度损失远小于求解时间收益，且
# 超时返回的 incumbent 同样受此阈值约束；设 0 则求全局最优（时间不可控），
# 现场可按经济性敏感度微调（如现货场景 0.005，计划场景 0.02）。
mip_rel_gap = 0.01
