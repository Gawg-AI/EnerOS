# ============================================================
# EnerOS v0.96.0 Cloud Coordinator — 数据汇聚配置
# ============================================================
# Crate: eneros-cloud-coordinator (crates/agents/cloud-coordinator/)
# 版本: v0.96.0 Cloud Coordinator 基础 — 数据汇聚（Phase 2 P2-D 收尾）
# 蓝图: phase2.md §v0.96.0
#
# 数据汇聚文义（一句话）：
#   云端按周期收集域内多个 Edge Box 状态（复用 v0.93.0 EdgeBoxState）→ 组装
#   DomainData（Schema 校验 + metrics sanitize）→ 通过 DataSink 存储，
#   支撑全局分析与审计，为 v0.112.0 云端孪生主节点提供数据基础。
#
# ---------------------------------------------------------------
# 1. 汇聚 <5s（蓝图 §7.2 性能量化）
# ---------------------------------------------------------------
#   单轮汇聚（collect：遍历全部数据源 fetch + Schema 组装）端到端耗时
#   < 5s —— 【集成阶段验收】，非本配置强制：本版本交付算法骨架 +
#   Mock 数据源/存储单元验证；真实 DataSource / DataSink 注入后由
#   集成阶段实测验收。collect_interval_ms 为汇聚周期占位（集成阶段
#   由调用方循环驱动，本版本无 ticker）。
#
# ---------------------------------------------------------------
# 2. 数据源超时跳过 + 标记不中断（蓝图 §4.4，D7）
# ---------------------------------------------------------------
#   单数据源 fetch 失败（超时/故障）→ 跳过该源继续收集其余源，
#   部分可用优于全失败（蓝图 §4.4）；失败通过 timeout_count 计数器
#   暴露可观测，不用 warn! 宏（no_std 无 log crate，D7）；
#   数据源错误以 AggError::SourceFailed(u64) 结构化返回。
#
# ---------------------------------------------------------------
# 3. 存储失败重试 + 本地缓存（蓝图 §4.4，D5）
# ---------------------------------------------------------------
#   蓝图要求存储失败重试 + 本地缓存。本版本 DataSink 为 sync trait
#   （store(&mut self, data, now_ms)），真实存储（TSDB / S3 / File）
#   为外部后端，不引入 no_std crate（§5.5 防重复造轮子）；
#   本版本以 MockDataSink 验证存储成功/失败/记录语义，真实实现
#   后续由外部 crate 实现并以 Box<dyn DataSink> 注入（D5）。
#
# ---------------------------------------------------------------
# 4. 数据脱敏标记（蓝图 §7.3，D12）
# ---------------------------------------------------------------
#   DomainData.is_sensitive 字段（bool，默认 false）为脱敏标记占位：
#   标记本批次数据是否含敏感信息，供存储/上行环节按标记分流；
#   脱敏执行逻辑（字段级掩码/过滤）后续 v0.101.0 断网处理实现（D12）。
#
# ---------------------------------------------------------------
# 5. NaN 防御（D9）
# ---------------------------------------------------------------
#   metrics 组装时对 BTreeMap<u64, f32> 值执行 sanitize：
#   非有限 f32（NaN/±Inf）→ 存入前置 0.0；
#   容量汇总时 capacity 非有限或 ≤0 → 按 0.0 计入；
#   数据量计数独立用 u64（collect_count / timeout_count / store_count）
#   不依赖 metric，NaN 不传播不 panic。
#
# ---------------------------------------------------------------
# 6. 新数据源可扩展（蓝图 §9 可扩展性）
# ---------------------------------------------------------------
#   DataSource 为 sync trait（fetch(&mut self, now_ms)），
#   DataAggregator.add_source 注入 Box<dyn DataSource>：
#   新增数据源类型仅需实现 DataSource 并 add_source，
#   汇聚器与存储层零改动（蓝图 §9）。max_sources 为容量上限占位。

[cloud_aggregator]
# 汇聚周期（ms），蓝图 §7.2 要求汇聚 <5s（集成阶段验收）
collect_interval_ms = 5000
# 最大数据源数（DataSource trait 注入，新数据源可扩展，蓝图 §9）
max_sources = 32
# metrics NaN 防御开关：非有限 f32 → 0.0（D9）
metric_sanitize = true
