# ============================================================
# EnerOS v0.95.0 Cloud Coordinator — 云端策略下发配置
# ============================================================
# Crate: eneros-cloud-coordinator (crates/agents/cloud-coordinator/)
# 版本: v0.95.0 Cloud Coordinator 基础 — 策略下发（Phase 2 P2-D 第 4 版，云边协同起点）
# 蓝图: phase2.md §v0.95.0
#
# 策略下发文义（一句话）：
#   云端生成全局策略（优化权重/电价预测/DR 响应/模型更新）→ CloudChannel 下发到边缘
#   → 边缘 validate_strategy 安全校验（非强制、可拒绝）→ EdgeAck 回流统计，
#   为 v0.96.0 数据汇聚与 v0.112.0 云端孪生主节点提供云边协同基础。
#
# ---------------------------------------------------------------
# 1. 下发延迟 <1s（蓝图 §7.2）
# ---------------------------------------------------------------
#   单条策略云端 → 边缘端到端延迟 < 1s —— 【集成阶段验收】，非本配置强制：
#   本版本交付算法骨架 + Mock 通道单元验证；真实通道（Socket v0.29.0 / DDS
#   适配器，D8）注入后由集成阶段实测验收。
#
# ---------------------------------------------------------------
# 2. 策略非强制、边缘可拒绝（蓝图 §5.2，边缘主权 §9）
# ---------------------------------------------------------------
#   云端策略仅为全局优化建议，边缘侧经 validate_strategy 校验本地安全约束，
#   违反约束（safety weight 不足 / DR 超本地容量）可确定性拒绝并回执
#   RejectReason，边缘主权保留（蓝图 §9）。
#
# ---------------------------------------------------------------
# 3. 断网重连补发（蓝图 §6.5/§9 可靠性，D9）
# ---------------------------------------------------------------
#   广播重试 max_retries 次仍失败（断网）→ 策略入 pending 待补发队列；
#   通道恢复后 republish_pending() 逐条补发，成功者移除、失败者保留，
#   保证网络抖动不丢策略（蓝图 §6.5 网络断开 → 重连补发）。
#
# ---------------------------------------------------------------
# 4. 策略版本化（蓝图 §5.2/§8.4 多版本兼容）
# ---------------------------------------------------------------
#   Strategy.version 字段标识策略格式版本，云边两侧按版本协商解析，
#   支撑多版本边缘混布场景下的兼容（蓝图 §8.4），模型更新策略另有
#   ModelRef { model_id, version } 双元组定位模型制品。
#
# ---------------------------------------------------------------
# 5. NaN 防御（D10/D12，v0.88.0 C140 / v0.94.0 D12 教训）
# ---------------------------------------------------------------
#   safety weight 缺失或非有限（NaN/±Inf）→ 按 0.0 处理 → 触发安全拒绝；
#   DR target_mw 非有限 → ExceedsCapacity 拒绝；
#   max_capacity_mw 非有限或 ≤0 → 一切 DR 策略拒绝（安全侧默认拒绝）。
#
# ---------------------------------------------------------------
# 6. 新策略类型可扩展（蓝图 §9 可扩展性）
# ---------------------------------------------------------------
#   StrategyContent 为枚举，新增策略类型仅需追加变体并在
#   validate_strategy 补充对应校验分支，既有 4 变体与通道层零改动。

[cloud_coordinator]
# 云端 endpoint 占位（Socket v0.29.0 / DDS 适配器后续注入，D8）
endpoint = "cloud.eneros.local:9000"
# Ack 收集超时（ms），语义等价蓝图 Duration::from_secs(10)（D3）
ack_timeout_ms = 10000
# 下发失败最大重试次数（D9）
max_retries = 3
# 安全权重下限：safety weight 缺失/NaN 按 0.0 → 拒绝（D10/D12，安全侧宁拒勿放）
safety_weight_min = 0.5
